# ─────────────────────────────────────────────────────────────────────────────
# MQTT — broker.emqx.io (public broker, plain TCP port 1883, no SSL/TLS)
#
# Command topic  →  bike/{bikeId}/command
#   Backend publishes: {"command":"UNLOCK","token":"1234"}
#                      {"command":"LOCK","token":"1234"}
#
# Status topic   ←  bike/{bikeId}/status   (backend subscribes)
#   ESP32 must send: {"token":"1234","status":"LOCKED"}
#                    {"token":"1234","status":"UNLOCKED"}
#                    {"token":"1234","battery":85}
#                    {"token":"1234","lat":9.03,"lng":38.74}
#
# Token "1234" is used for testing. Change in production.
# ─────────────────────────────────────────────────────────────────────────────
mqtt:
  broker: tcp://broker.emqx.io:1883
  client-id: spring-backend
  username: ""
  password: ""
  token: "1234"

