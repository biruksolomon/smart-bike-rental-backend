server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: smart-bike
    version: 1
    description: WiFi-based Smart Bike Rental Backend

  datasource:
    url: jdbc:postgresql://ep-summer-salad-aqlm9g8k-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: npg_X4iqTO5aQkFj
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM:noreply@smartbike.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}

admin:
  email: ${ADMIN_EMAIL:admin@smartbike.com}
  password: ${ADMIN_PASSWORD:Admin@123}
  name: ${ADMIN_NAME:System Administrator}
  phone: ${ADMIN_PHONE:+1234567890}

mqtt:
  broker: ssl://graycuckoo-7d8fe22a.a03.euc1.aws.hivemq.cloud:8883
  client-id: spring-backend

  username: hivemq.webclient.1778502183752
  password: Q0V9xay,E#DM>hF:g18l



jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: false
    filter: true
    doc-expansion: list
  packages-to-scan: com.IoT.smart_bike_rental_backend.controller
  paths-to-match: /**
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: WARN
    com:
      IoT:
        smart_bike_rental_backend: INFO
  format: "%d{ISO8601} %msg%n"
