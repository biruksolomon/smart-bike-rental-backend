server:
  port: ${PORT:8080}

spring:
  application:
    name: smart-bike
    version: 1
    description: Smart Bike Rental Backend (Render)
    base-url: https://smart-bike-rental-backend.onrender.com

  datasource:
    url: jdbc:postgresql://ep-summer-salad-aqlm9g8k-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: npg_X4iqTO5aQkFj
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM:noreply@smartbike.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}

admin:
  email: ${ADMIN_EMAIL:admin@smartbike.com}
  password: ${ADMIN_PASSWORD:Admin@123}
  name: ${ADMIN_NAME:System Administrator}
  phone: ${ADMIN_PHONE:+1234567890}

mqtt:
  broker: tcp://broker.emqx.io:1883
  client-id: spring-backend
  username: ""
  password: ""
  token: "1234"

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

chapa:
  secret-key: ${CHAPA_SECRET_KEY}
  webhook-secret: ${CHAPA_WEBHOOK_SECRET}
  enabled: ${CHAPA_ENABLED:true}

app:
  callback-url: ${APP_CALLBACK_URL}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: false
    filter: true
  packages-to-scan: com.IoT.smart_bike_rental_backend.controller
  paths-to-match: /**
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN
    com.IoT.smart_bike_rental_backend: INFO
